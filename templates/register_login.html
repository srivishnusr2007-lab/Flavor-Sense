<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flavorsense – Welcome</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="bg-pattern" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
      <pattern id="foodTile" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
        <!-- Lemon -->
        <g transform="translate(22,20)">
          <circle cx="0" cy="0" r="14" fill="#FFE033" stroke="#F5C200" stroke-width="1.5"/>
          <circle cx="0" cy="0" r="9" fill="#FFF176" stroke="#F5C200" stroke-width="0.8"/>
          <line x1="0" y1="-9" x2="0" y2="9" stroke="#F5C200" stroke-width="0.9"/>
          <line x1="-9" y1="0" x2="9" y2="0" stroke="#F5C200" stroke-width="0.9"/>
          <line x1="-6" y1="-6" x2="6" y2="6" stroke="#F5C200" stroke-width="0.7"/>
          <line x1="6" y1="-6" x2="-6" y2="6" stroke="#F5C200" stroke-width="0.7"/>
        </g>
        <!-- Red chili -->
        <g transform="translate(108,18) rotate(20)">
          <path d="M0,-14 C-9,-8 -9,8 0,14 C9,8 9,-8 0,-14Z" fill="#FF3B30" stroke="#C0392B" stroke-width="1.2"/>
          <line x1="0" y1="-14" x2="2" y2="-20" stroke="#4CAF50" stroke-width="1.5"/>
          <path d="M2,-20 C6,-22 8,-18 5,-17" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
        </g>
        <!-- Herb sprig -->
        <g transform="translate(18,90) rotate(-12)">
          <line x1="0" y1="22" x2="0" y2="-8" stroke="#388E3C" stroke-width="1.3"/>
          <ellipse cx="-6" cy="12" rx="5" ry="8" fill="#66BB6A" stroke="#388E3C" stroke-width="1" transform="rotate(-28,-6,12)"/>
          <ellipse cx="6" cy="4" rx="5" ry="8" fill="#81C784" stroke="#388E3C" stroke-width="1" transform="rotate(22,6,4)"/>
          <ellipse cx="-5" cy="-4" rx="4.5" ry="7" fill="#66BB6A" stroke="#388E3C" stroke-width="1" transform="rotate(-18,-5,-4)"/>
        </g>
        <!-- Orange slice -->
        <g transform="translate(128,82)">
          <circle cx="0" cy="0" r="13" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/>
          <circle cx="0" cy="0" r="8" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
          <line x1="0" y1="-8" x2="0" y2="8" stroke="#E65100" stroke-width="0.8"/>
          <line x1="-8" y1="0" x2="8" y2="0" stroke="#E65100" stroke-width="0.8"/>
          <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="#E65100" stroke-width="0.7"/>
          <line x1="5.5" y1="-5.5" x2="-5.5" y2="5.5" stroke="#E65100" stroke-width="0.7"/>
        </g>
        <!-- Strawberry -->
        <g transform="translate(72,50)">
          <path d="M0,14 C-10,8 -11,-4 -5,-10 C-2,-13 2,-13 5,-10 C11,-4 10,8 0,14Z" fill="#E53935" stroke="#B71C1C" stroke-width="1.2"/>
          <path d="M-5,-10 C-3,-16 3,-16 5,-10" fill="#4CAF50" stroke="#388E3C" stroke-width="1"/>
          <circle cx="-3" cy="-1" r="1.2" fill="#FFCDD2"/>
          <circle cx="3" cy="1" r="1.2" fill="#FFCDD2"/>
          <circle cx="0" cy="6" r="1.2" fill="#FFCDD2"/>
          <circle cx="-4" cy="7" r="1.2" fill="#FFCDD2"/>
        </g>
        <!-- Avocado -->
        <g transform="translate(42,130)">
          <path d="M0,-16 C-12,-10 -12,8 0,16 C12,8 12,-10 0,-16Z" fill="#558B2F" stroke="#33691E" stroke-width="1.3"/>
          <path d="M0,-8 C-6,-4 -6,6 0,10 C6,6 6,-4 0,-8Z" fill="#AED581" stroke="#7CB342" stroke-width="0.9"/>
          <ellipse cx="0" cy="2" rx="4" ry="5" fill="#795548" stroke="#4E342E" stroke-width="0.8"/>
        </g>
        <!-- Garlic -->
        <g transform="translate(118,136)">
          <path d="M0,-14 C-10,-12 -12,0 -8,10 C-4,16 4,16 8,10 C12,0 10,-12 0,-14Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
          <line x1="-6" y1="-2" x2="-8" y2="-10" stroke="#F9A825" stroke-width="1"/>
          <line x1="0" y1="-2" x2="0" y2="-12" stroke="#F9A825" stroke-width="1"/>
          <line x1="6" y1="-2" x2="8" y2="-10" stroke="#F9A825" stroke-width="1"/>
          <line x1="0" y1="-14" x2="0" y2="-20" stroke="#8BC34A" stroke-width="1.5"/>
        </g>
        <!-- Mushroom -->
        <g transform="translate(82,118)">
          <path d="M-10,2 C-12,-8 -4,-16 0,-16 C4,-16 12,-8 10,2Z" fill="#BCAAA4" stroke="#795548" stroke-width="1.2"/>
          <rect x="-4" y="2" width="8" height="9" rx="1" fill="#EFEBE9" stroke="#795548" stroke-width="1"/>
          <line x1="-2" y1="4" x2="-2" y2="10" stroke="#BCAAA4" stroke-width="0.8"/>
          <line x1="2" y1="4" x2="2" y2="10" stroke="#BCAAA4" stroke-width="0.8"/>
        </g>
        <!-- Blueberries -->
        <g transform="translate(148,40)">
          <circle cx="-6" cy="4" r="5" fill="#5C6BC0" stroke="#3949AB" stroke-width="1"/>
          <circle cx="6" cy="4" r="5" fill="#7986CB" stroke="#3949AB" stroke-width="1"/>
          <circle cx="0" cy="-4" r="5" fill="#5C6BC0" stroke="#3949AB" stroke-width="1"/>
          <circle cx="-6" cy="4" r="1.5" fill="#9FA8DA"/>
          <circle cx="6" cy="4" r="1.5" fill="#9FA8DA"/>
          <circle cx="0" cy="-4" r="1.5" fill="#9FA8DA"/>
        </g>
        <!-- Carrot -->
        <g transform="translate(155,118) rotate(-25)">
          <path d="M0,-18 C-5,-14 -5,2 0,10 C5,2 5,-14 0,-18Z" fill="#FF7043" stroke="#E64A19" stroke-width="1.2"/>
          <line x1="0" y1="-18" x2="0" y2="-24" stroke="#4CAF50" stroke-width="1.5"/>
          <line x1="0" y1="-20" x2="-5" y2="-26" stroke="#4CAF50" stroke-width="1.2"/>
          <line x1="0" y1="-20" x2="5" y2="-26" stroke="#4CAF50" stroke-width="1.2"/>
        </g>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#foodTile)"/>
  </svg>
</div>

<!-- Optional soft vignette overlay -->
<div class="bg-vignette"></div>
<div class="container" style="max-width:520px;">

  <header class="fs-header">
    <img src="/static/logo.jpg" class="fs-logo" alt="Flavorsense Logo">
    <h1 class="fs-title">Flavor<span>sense</span></h1>
    <p class="fs-sub">Your daily mess, rated honestly.</p>
    <div class="divider"></div>
  </header>

  <div class="card" style="animation-delay:0.1s;">

    <!-- Tab Bar -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn {% if show == 'register' %}active{% endif %}" onclick="switchTab('register')">Register</button>
      <button class="tab-btn {% if show == 'login' %}active{% endif %}"   onclick="switchTab('login')">Login</button>
    </div>

    {% if error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
    {% endif %}

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display: {% if show == 'login' %}none{% else %}block{% endif %};">
      <form method="POST" action="/register">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="e.g. Arjun Sharma" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="your@college.edu" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">
          🍽 Create Account
        </button>
      </form>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" style="display: {% if show == 'login' %}block{% else %}none{% endif %};">
      <form method="POST" action="/student-login">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="your@college.edu" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">
          🔓 Login
        </button>
      </form>
    </div>

  </div>

  <div class="footer-link">
    Staff? <a href="/staff-login">Staff Login →</a>
  </div>

</div>

<script>
function switchTab(tab) {
  const tabs = document.querySelectorAll('.tab-btn');
  const reg  = document.getElementById('registerForm');
  const log  = document.getElementById('loginForm');
  tabs.forEach(t => t.classList.remove('active'));

  if (tab === 'register') {
    tabs[0].classList.add('active');
    reg.style.display = 'block';
    log.style.display = 'none';
  } else {
    tabs[1].classList.add('active');
    log.style.display = 'block';
    reg.style.display = 'none';
  }
}
</script>

</body>
</html>
